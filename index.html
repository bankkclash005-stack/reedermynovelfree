<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Novel Reader (Stable Version)</title>
    <style>
        :root { --bg-color: #f4f1ea; --text-color: #2c3e50; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, 'Noto Sans Thai', sans-serif; line-height: 1.8; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #controls { position: fixed; top: 0; width: 100%; background: #fff; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 10px; z-index: 100; }
        #reader-container { max-width: 800px; width: 90%; margin-top: 130px; margin-bottom: 50px; padding: 30px; background: white; min-height: 80vh; }
        
        /* ปรับปรุงการแสดงผลย่อหน้า */
        p.novel-para { margin-bottom: 1.5em; text-indent: 2em; cursor: help; font-size: 1.1em; transition: 0.2s; border-radius: 4px; padding: 5px; }
        p.novel-para:hover { background: #fdfae1; outline: 1px dashed #ccc; }
        
        /* Modal */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); display: none; z-index: 1000; width: 400px; }
        .modal h4 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        .original-preview { background: #f8f9fa; padding: 10px; border-radius: 6px; font-size: 0.9em; color: #666; border-left: 4px solid #3498db; margin-bottom: 10px; max-height: 80px; overflow-y: auto; word-break: break-all; }
        
        #toc-menu { position: fixed; right: 20px; top: 130px; background: white; border: 1px solid #ccc; max-height: 60vh; overflow-y: auto; width: 250px; display: none; padding: 10px; box-shadow: -2px 2px 10px rgba(0,0,0,0.1); z-index: 99; }
        .toc-item { cursor: pointer; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9em; }
        .toc-item.active { background-color: #e3f2fd; font-weight: bold; border-left: 4px solid #1976d2; }
        
        button { padding: 8px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #ddd; background: #fff; transition: 0.2s; }
        button:hover { background: #f0f0f0; }
        .btn-save { background: #2ecc71; color: white; border: none; font-weight: bold; }
        .primary-btn { background: #e3f2fd; border-color: #90caf9; color: #1976d2; }
        .danger-btn { background: #fff5f5; color: #c0392b; border-color: #fb8c8c; }
    </style>
</head>
<body>

<div id="controls">
    <input type="file" id="fileInput" accept=".txt">
    <button onclick="toggleTOC()">📖 สารบัญ</button>
    <button onclick="changeChapter(-1)">ก่อนหน้า</button>
    <button onclick="changeChapter(1)">ถัดไป</button>
    <button class="primary-btn" onclick="openDictModal()">🗂️ คลังคำศัพท์</button>
    <button class="danger-btn" onclick="clearDictionary()">🗑️ ล้างทั้งหมด</button>
</div>

<div id="edit-modal" class="modal">
    <h4>📝 แก้ไขการแปล</h4>
    <p style="font-size: 0.85em; margin-bottom: 5px;">ต้นฉบับจีนในย่อหน้านี้:</p>
    <div id="originalContext" class="original-preview"></div>
    
    <label style="font-size: 0.85em;">คำจีนที่ต้องการเปลี่ยน:</label>
    <input type="text" id="originalWord" placeholder="Copy คำจีนจากด้านบนมาวางที่นี่">
    
    <label style="font-size: 0.85em;">เปลี่ยนเป็นคำไทย:</label>
    <input type="text" id="replaceWith" placeholder="ใส่คำแปลที่ต้องการ">
    
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button onclick="saveWord()" class="btn-save" style="flex: 2;">ตกลง</button>
        <button onclick="closeModal('edit-modal')" style="flex: 1;">ยกเลิก</button>
    </div>
</div>

<div id="dict-modal" class="modal" style="width: 450px;">
    <h3>🗂️ รายการคำศัพท์ที่แก้ไข</h3>
    <div id="dict-list-container" style="max-height: 300px; overflow-y: auto;"></div>
    <div style="text-align: right; margin-top: 20px;">
        <button onclick="closeModal('dict-modal')">ปิดหน้าต่าง</button>
    </div>
</div>

<div id="toc-menu"></div>

<div id="reader-container">
    <div id="content-display">
        <h2 style="text-align: center;">กรุณาโหลดไฟล์ .txt</h2>
    </div>
</div>

<script>
    let rawChapters = []; 
    let currentChapterIndex = 0;
    let customDict = JSON.parse(localStorage.getItem('novel_dict_v2') || '{}'); 

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (content) => {
            const text = content.target.result;
            const chapterRegex = /(?=Chapter|บทที่|第[0-9一二三四五六七八九十百千]+[章节回]|\n{2,}(?=[^\n]{1,20}\n))/i;
            rawChapters = text.split(chapterRegex).filter(c => c.trim().length > 10);
            buildTOC();
            renderChapter(0);
        };
        reader.readAsText(file);
    });

    function renderChapter(index) {
        if (index < 0 || index >= rawChapters.length) return;
        currentChapterIndex = index;
        const display = document.getElementById('content-display');
        let lines = rawChapters[index].trim().split('\n');
        
        const sortedKeys = Object.keys(customDict).sort((a, b) => b.length - a.length);

        const html = lines.map((line) => {
            if(!line.trim()) return "";
            let originalLine = line.trim();
            let translatedLine = originalLine;

            // แทนที่คำตาม Dictionary
            for (const oldWord of sortedKeys) {
                const regex = new RegExp(escapeRegExp(oldWord), 'g');
                translatedLine = translatedLine.replace(regex, customDict[oldWord]);
            }

            // ใช้ title attribute เก็บภาษาจีน (Google Translate จะไม่ยุ่งกับค่านี้)
            return `<p class="novel-para" onclick="handleParaClick(this)" title="${originalLine}">${translatedLine}</p>`;
        }).join('');

        display.innerHTML = `<h2>ตอนที่ ${index + 1}</h2>` + html;
        window.scrollTo(0,0);
        updateTOCActiveState();
    }

    function handleParaClick(el) {
        // ดึงต้นฉบับจีนจาก title attribute
        const rawText = el.getAttribute('title');
        const selectedText = window.getSelection().toString().trim();
        
        const contextBox = document.getElementById('originalContext');
        contextBox.innerText = rawText;

        const originalInput = document.getElementById('originalWord');
        
        // ถ้าสิ่งที่คลุมดำเป็นภาษาจีน ให้ใส่ในช่องเลย
        if (/[\u4E00-\u9FA5]/.test(selectedText)) {
            originalInput.value = selectedText;
        } else {
            originalInput.value = ""; // ถ้าเป็นไทย ให้ว่างไว้ให้ user copy จีนมาวาง
            originalInput.placeholder = "ลากคำจีนจากด้านบนมาวางที่นี่";
        }

        document.getElementById('replaceWith').value = customDict[originalInput.value] || "";
        document.getElementById('edit-modal').style.display = 'block';
    }

    function saveWord() {
        const oldW = document.getElementById('originalWord').value.trim();
        const newW = document.getElementById('replaceWith').value.trim();
        if (oldW && newW) {
            customDict[oldW] = newW;
            localStorage.setItem('novel_dict_v2', JSON.stringify(customDict));
            closeModal('edit-modal');
            renderChapter(currentChapterIndex);
        }
    }

    function buildTOC() {
        const toc = document.getElementById('toc-menu');
        toc.innerHTML = '<h3>รายชื่อบท</h3>';
        rawChapters.forEach((ch, i) => {
            const d = document.createElement('div');
            d.className = 'toc-item';
            d.id = `toc-ch-${i}`;
            d.innerText = `บทที่ ${i + 1}`;
            d.onclick = () => { renderChapter(i); toggleTOC(); };
            toc.appendChild(d);
        });
    }

    function updateTOCActiveState() {
        document.querySelectorAll('.toc-item').forEach((item, idx) => {
            item.classList.toggle('active', idx === currentChapterIndex);
        });
    }

    function openDictModal() {
        const container = document.getElementById('dict-list-container');
        container.innerHTML = '';
        Object.keys(customDict).forEach(key => {
            const div = document.createElement('div');
            div.style = "display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee";
            div.innerHTML = `<span style="word-break:break-all"><b>${key}</b> ➡️ ${customDict[key]}</span> 
                             <button onclick="deleteDict('${key}')" class="danger-btn" style="padding:2px 5px">✕</button>`;
            container.appendChild(div);
        });
        document.getElementById('dict-modal').style.display = 'block';
    }

    function deleteDict(key) {
        delete customDict[key];
        localStorage.setItem('novel_dict_v2', JSON.stringify(customDict));
        openDictModal();
        renderChapter(currentChapterIndex);
    }

    function clearDictionary() {
        if(confirm("ล้างข้อมูลการแก้คำศัพท์ทั้งหมด?")) {
            customDict = {};
            localStorage.removeItem('novel_dict_v2');
            renderChapter(currentChapterIndex);
        }
    }

    function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleTOC() { const m = document.getElementById('toc-menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
    function changeChapter(step) { renderChapter(currentChapterIndex + step); }
</script>
</body>
</html>
