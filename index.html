<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Novel Splitter - Top Navigation</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .header-box { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 15px; }
        input[type="file"] { margin-bottom: 15px; padding: 10px; border: 1px dashed #aaa; width: 100%; box-sizing: border-box; cursor: pointer; }

        /* แถบควบคุม */
        .controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin: 20px 0; 
            gap: 10px; 
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            position: sticky; /* ทำให้แถบบนติดขอบจอเวลาเลื่อนได้ (ถ้าต้องการ) */
            top: 10px;
            z-index: 100;
            border: 1px solid #e2e2e2;
        }

        #content-display { 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            background: #fff; 
            padding: 25px; 
            border: 1px solid #ddd; 
            border-radius: 8px;
            line-height: 1.8;
            font-size: 18px; 
            min-height: 500px;
        }

        .nav-btns button { padding: 12px 20px; cursor: pointer; border-radius: 6px; border: 1px solid #ccc; background: #fff; font-size: 16px; font-weight: bold; }
        .nav-btns button:hover { background: #e9ecef; }
        .nav-btns button:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .btn-download { background: #28a745; color: white; border: none; font-weight: bold; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .btn-download:hover { background: #218838; }

        .page-info { font-weight: bold; color: #d63384; font-size: 16px; }
        .tips { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2>📖 เครื่องมือแยกบทนิยาย (หน้าละ 5 บท)</h2>
        <input type="file" id="fileInput" accept=".txt">
    </div>

    <div id="page-viewer" style="display:none;">
        <div class="controls">
            <div class="nav-btns">
                <button class="prevBtn" onclick="changePage(-1)">⬅️ ก่อนหน้า</button>
                <button class="nextBtn" onclick="changePage(1)">ถัดไป ➡️</button>
            </div>
            <span class="page-info pageInfoDisplay">หน้าที่ 1</span>
            <button class="btn-download" onclick="downloadCurrentPage()">💾 ดาวน์โหลด (.txt)</button>
        </div>

        <div id="content-display"></div>

        <div class="controls">
            <div class="nav-btns">
                <button class="prevBtn" onclick="changePage(-1)">⬅️ ก่อนหน้า</button>
                <button class="nextBtn" onclick="changePage(1)">ถัดไป ➡️</button>
            </div>
            <span class="page-info pageInfoDisplay">หน้าที่ 1</span>
        </div>
        <div class="tips">*ใช้ส่วนขยายแปลหน้าเว็บให้เสร็จก่อน แล้วกดปุ่มดาวน์โหลดสีเขียว</div>
    </div>
</div>

<script>
    let chapterGroups = [];
    let currentPage = 0;

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            processNovel(event.target.result);
        };
        reader.readAsText(file);
    });

    function processNovel(text) {
        // แยกบทด้วย Regex เดิม
        const chapters = text.split(/(?=第[0-9一二三四五六七八九十百千]+[章\s])/);
        const filteredChapters = chapters.filter(c => c.trim().length > 0);
        
        chapterGroups = [];
        const chaptersPerPage = 5; // กำหนดจำนวนบทต่อหน้า

        for (let i = 0; i < filteredChapters.length; i += chaptersPerPage) {
            let group = [];
            // ดึงบทที่ i ถึง i+4 (รวม 5 บท)
            for (let j = 0; j < chaptersPerPage; j++) {
                if (filteredChapters[i + j]) {
                    group.push(filteredChapters[i + j]);
                }
            }
            // รวมบทเข้าด้วยกันโดยเว้นบรรทัด
            chapterGroups.push(group.join("\n\n"));
        }

        if (chapterGroups.length > 0) {
            currentPage = 0;
            document.getElementById('page-viewer').style.display = 'block';
            renderPage();
        }
    }

    function renderPage() {
        const display = document.getElementById('content-display');
        const infoDisplays = document.querySelectorAll('.pageInfoDisplay');
        const prevBtns = document.querySelectorAll('.prevBtn');
        const nextBtns = document.querySelectorAll('.nextBtn');
        
        display.innerText = chapterGroups[currentPage];
        
        infoDisplays.forEach(el => {
            el.innerText = `หน้า ${currentPage + 1} / ${chapterGroups.length}`;
        });

        prevBtns.forEach(btn => btn.disabled = currentPage === 0);
        nextBtns.forEach(btn => btn.disabled = currentPage === chapterGroups.length - 1);
        
        // เมื่อเปลี่ยนหน้า ให้เลื่อนกลับขึ้นไปด้านบนสุด
        window.scrollTo(0, 0);
    }

    function changePage(step) {
        currentPage += step;
        renderPage();
    }

    function downloadCurrentPage() {
        const content = document.getElementById('content-display').innerText;
        const blob = new Blob([content], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        
        const fileName = `novel_page_${currentPage + 1}.txt`;
        a.href = url;
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
