　　“您是····南宫大师？！”星月枫张大着嘴巴，红润小巧的唇瓣水润润的，里面的白牙粉舌看起来十分的诱惑，就是现在她的表情很是惊奇。

　　“嗯，是我~”南宫千夜淡然的嗯了一下，因为自己确实太年轻了，还不到17岁。

　　这个岛国城市里搞事情，到处害人的脏东西虽然不多，但遗留下来的痕迹，或者影响到人的情况还是有不少的，不然他哪来的钱财和身份来买下这市区里占地两千平米的小院呢？还不是这一年中连着帮了好几个官员，土豪解决脏东西留下来的痕迹才得来的。

第2章 轻松除小鬼！任务奖励到手~
　　滴答，滴答~
　　街道房屋两边的空调外机处，一些凝结的水珠落在青苔生长的石板上，发出很是轻微的响声，无行走人的街道上，有一根散发着橙黄色灯光的老旧路灯忽亮忽暗，尽管现在太阳还没落山，但这处街道依旧光线昏暗，再加上这古怪的灯光一直闪烁，倒是有些渗人的很。
　　“星月妹子，你不是高中生吗？怎么会没事往这边跑？”

　　虽然现在南宫千夜这个除妖大师就在自己的身后跟着，但一想到这边有妖魔鬼怪什么的脏东西，甚至说待会她就能看见南宫千夜是怎么除妖的，但她还是有点小怕的。
　　再怎么说，她也只是一个高中生少女而已，女孩子，怎么能不怕那种长相恐怖的脏东西呢？
　　“原来是这样，你是意外才被那东西给盯住的啊。”南宫千夜笑了一下。

　　还有一点就是，星月枫怎么着也算得上这个世界的‘女主’，她能引得这些脏东西的窥伺，也不算什么奇怪的事情。
　　为了缓解少女心里的压力，南宫千夜给她讲了一些关于妖魔鬼怪等脏东西的基础知识，并且也示意待会她不要太过害怕，尤其不要大喊大叫什么的，这东西在除妖的时候，还是比较忌讳的。
　　明明不那么紧张的，你非得喊叫的让人，鬼耳朵都受不了，那可真是伤敌八百，自损一千······对于他这样道法术较为粗浅的普通除妖师来说，一旦分心，那多多少少会影响到术法的——没办法，谁让之前的系统不给力啊。
　　听着南宫千夜的叮嘱，星月枫慢慢的冷静下来，天蓝色的眸子看着南宫千夜，里面闪烁着信任的眸光。
　　南宫大师好厉害，人又温柔，长的又帅气，还这么年轻就能除妖了·····也不知道他有女朋友没，哎呀，我真是笨蛋，人家可是大师啊，怎么能谈恋爱呢~
　　在两人走动的时候，一团黝黑带着青色的影子正慢慢的从那老旧古怪的路灯下方凝聚而出，就像是一团水墨慢慢的从地面渗出。

   const chapters = rawContent.trim().split(/(?=第?\s*\d+\s*[章节回]|ตอนที่\s*\d+|Chapter\s*\d+)/g).filter(c => c.trim().length > 0);

// เพิ่มบรรทัดนี้เพื่อตรวจสอบความผิดพลาดใน Console (กด F12 ดูได้)
console.log("จำนวนตอนที่แยกได้:", chapters.length); 

let currentIndex = parseInt(localStorage.getItem('myChineseNovelLastPage')) || 0;
// ถ้า index เกินจำนวนตอนที่มี (กรณีเปลี่ยนไฟล์ใหม่) ให้กลับไปหน้า 0
if (currentIndex >= chapters.length) currentIndex = 0;

    const contentDiv = document.getElementById('content');
    const pageLabel = document.getElementById('page-label');
    const tocList = document.getElementById('toc-list');
    const tocModal = document.getElementById('toc-modal');

    // 3. สร้างรายการสารบัญ
    function buildTOC() {
        tocList.innerHTML = '';
        chapters.forEach((chapter, index) => {
            const title = chapter.split('\n')[0].substring(0, 50); 
            const item = document.createElement('div');
            item.className = `toc-item ${index === currentIndex ? 'active' : ''}`;
            item.innerText = title;
            item.onclick = () => {
                currentIndex = index;
                render();
                toggleTOC();
            };
            tocList.appendChild(item);
        });
    }

    function render() {
        if(chapters.length === 0) {
            contentDiv.innerHTML = "未找到章节内容";
            return;
        }
        contentDiv.innerHTML = chapters[currentIndex];
        pageLabel.innerText = `第 ${currentIndex + 1} / ${chapters.length} 章`;
        localStorage.setItem('myChineseNovelLastPage', currentIndex);
        window.scrollTo({ top: 0, behavior: 'instant' });
        
        document.querySelectorAll('.toc-item').forEach((el, i) => {
            el.classList.toggle('active', i === currentIndex);
        });
    }

    function toggleTOC() {
        const isVisible = tocModal.style.display === 'flex';
        tocModal.style.display = isVisible ? 'none' : 'flex';
        if (!isVisible) {
            const activeItem = document.querySelector('.toc-item.active');
            if (activeItem) activeItem.scrollIntoView({ block: 'center' });
        }
    }

    function closeModal(e) {
        tocModal.style.display = 'none';
    }

    window.addEventListener('keydown', (e) => {
        if (tocModal.style.display === 'flex') {
            if (e.key === 'Escape') toggleTOC();
            return;
        }

        if (e.key === 'ArrowRight') {
            if (currentIndex < chapters.length - 1) { currentIndex++; render(); }
        } else if (e.key === 'ArrowLeft') {
            if (currentIndex > 0) { currentIndex--; render(); }
        } else if (e.key === 'm' || e.key === 'M') {
            toggleTOC();
        }
    });

    buildTOC();
    render();
</script>
